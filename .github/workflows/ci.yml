name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 server.py --count --max-line-length=120 --statistics \
            --ignore=E203,E241,E302,E305,E402,E501,W503

      - name: Verify syntax and imports
        run: |
          python -c "import ast; ast.parse(open('server.py', encoding='utf-8').read()); print('Syntax OK')"

      - name: Verify tool count
        run: |
          python -c "
          import re
          with open('server.py', encoding='utf-8') as f:
              content = f.read()
          tool_count = len(re.findall(r'@mcp\.tool\(', content))
          assert tool_count >= 21, f'Expected >= 21 tools, got {tool_count}'
          print(f'{tool_count} tools found — OK')
          "
