services:
  codingwebsearch:
    build: .
    image: codingwebsearch:0.6.0
    container_name: codingwebsearch
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
      # Optional API keys (uncomment to use)
      # - BRAVE_SEARCH_API_KEY=
      # - GOOGLE_API_KEY=
      # - GOOGLE_CSE_ID=
      # - BING_SEARCH_API_KEY=
      # - SEARXNG_URL=
      - SEARCH_ENGINES=auto
