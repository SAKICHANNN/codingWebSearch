version: "3.9"

services:
  codingwebsearch:
    build: .
    image: codingwebsearch:0.3.0
    container_name: codingwebsearch
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
      # Optional API keys (uncomment to use)
      # - BRAVE_SEARCH_API_KEY=
      # - GOOGLE_API_KEY=
      # - GOOGLE_CSE_ID=
      # - BING_SEARCH_API_KEY=
      - SEARCH_ENGINES=auto
    # For HTTP transport mode (optional):
    # ports:
    #   - "8080:8080"
    restart: unless-stopped
